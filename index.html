<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Sauce Pantry</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0b0a;
    --surface: #1a1816;
    --card-inner: #24211e;
    --accent: #e9c46a;
    --text-primary: #fdfaf5;
    --text-secondary: #a8a29d;
    
    /* Vibrant Pill Colors */
    --spicy: #e76f51;    --fresh: #2a9d8f;
    --citrusy: #e9c46a;  --umami: #457b9d;
    --creamy: #b5838d;   --smoky: #6d6875;
    --nutty: #bc6c25;    --bold: #ef476f;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.4;
    overflow-x: hidden;
  }

  header { padding: 40px 20px 20px; text-align: center; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin: 0; font-style: italic; color: var(--accent); }
  .subtitle { color: var(--text-secondary); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 8px; }

  .container {
    padding: 0 20px 200px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .recipe-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }

  .card {
    background: var(--surface);
    border-radius: 22px;
    padding: 22px;
    display: flex;
    flex-direction: column;
    border: 1px solid #2d2a27;
  }

  .card h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin: 0 0 12px; color: #fff; }
  .recipe-box { background: var(--card-inner); padding: 12px; border-radius: 12px; margin-bottom: 10px; }
  .recipe-box label { display: block; color: var(--accent); font-size: 10px; text-transform: uppercase; font-weight: 800; margin-bottom: 4px; }
  .recipe-box p { margin: 0; font-size: 13px; color: #f0f0f0; }
  .pairing-info { font-size: 12px; color: var(--text-secondary); margin-top: 8px; }
  .pairing-info strong { color: #888; font-size: 10px; text-transform: uppercase; }

  /* --- STYLISH CUSTOM FILTER DOCK --- */
  .filter-dock {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(22, 20, 18, 0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(233, 196, 106, 0.2);
    padding: 15px 15px calc(15px + env(safe-area-inset-bottom));
    z-index: 1000;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
  }

  @media (min-width: 768px) {
    .filter-dock { grid-template-columns: repeat(4, 1fr); max-width: 800px; margin: 0 auto; border-radius: 20px 20px 0 0; }
  }

  .dropdown-container { position: relative; }

  /* The Button/Trigger */
  .filter-trigger {
    width: 100%;
    background: #2a2724;
    border: 1px solid #3d3a37;
    padding: 12px;
    border-radius: 12px;
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 600;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .filter-trigger::after { content: '▾'; font-size: 10px; color: var(--accent); }

  /* The Custom Menu (Opens Upward) */
  .filter-menu {
    position: absolute;
    bottom: calc(100% + 10px);
    left: 0; right: 0;
    background: #2a2724;
    border: 1px solid var(--accent);
    border-radius: 14px;
    max-height: 250px;
    overflow-y: auto;
    display: none; /* Hidden by default */
    flex-direction: column;
    box-shadow: 0 -10px 25px rgba(0,0,0,0.6);
    z-index: 1001;
  }

  .filter-menu.show { display: flex; animation: slideUp 0.2s ease-out; }

  @keyframes slideUp {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .filter-option {
    padding: 14px 15px;
    font-size: 13px;
    border-bottom: 1px solid #333;
    color: #ccc;
    cursor: pointer;
  }
  .filter-option:last-child { border-bottom: none; }
  .filter-option:hover, .filter-option.selected { background: #3d3a37; color: var(--accent); }
  .filter-option.disabled { display: none; } /* Smart Hide */

  /* Badges */
  .badge-row { margin-top: auto; padding-top: 15px; display: flex; flex-wrap: wrap; gap: 6px; }
  .badge { padding: 4px 10px; border-radius: 6px; font-size: 9px; font-weight: 800; text-transform: uppercase; color: #fff; }
  .tag-Spicy { background: var(--spicy); }
  .tag-Fresh { background: var(--fresh); }
  .tag-Citrusy { background: var(--citrusy); }
  .tag-Umami { background: var(--umami); }
  .tag-Creamy { background: var(--creamy); }
  .tag-Smoky { background: var(--smoky); }
  .tag-Nutty { background: var(--nutty); }
  .tag-Bold { background: var(--bold); }
  .tag-Flavor { border: 1px solid #444; color: #aaa; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <h1>The Sauce Pantry</h1>
  <div class="subtitle">Artisanal Flavor Picker</div>
</header>

<div class="container">
  <div id="cardContainer" class="recipe-grid"></div>
</div>

<!-- Custom Filter Dock -->
<div class="filter-dock">
  <div class="dropdown-container" id="moodDropdown">
    <div class="filter-trigger" onclick="toggleMenu('moodMenu')">Moods</div>
    <div class="filter-menu" id="moodMenu"></div>
  </div>
  <div class="dropdown-container" id="flavorDropdown">
    <div class="filter-trigger" onclick="toggleMenu('flavorMenu')">Flavours</div>
    <div class="filter-menu" id="flavorMenu"></div>
  </div>
  <div class="dropdown-container" id="proteinDropdown">
    <div class="filter-trigger" onclick="toggleMenu('proteinMenu')">Proteins</div>
    <div class="filter-menu" id="proteinMenu"></div>
  </div>
  <div class="dropdown-container" id="veggieDropdown">
    <div class="filter-trigger" onclick="toggleMenu('veggieMenu')">Veggies</div>
    <div class="filter-menu" id="veggieMenu"></div>
  </div>
</div>

<script>
const sauces = [
  { name: "🇰🇷 Gochujang Glaze", recipe: "3 tbsp Gochujang, 2 tbsp Soy sauce, 1 tbsp Honey", optional: "Sesame oil", proteins: ["Poultry", "Tofu"], veggies: ["Cruciferous", "Root Vegetables"], mood: ["Spicy", "Umami"], flavor: ["Asian"] },
  { name: "🇲🇽 Salsa Macha", recipe: "1 cup Oil, 1/2 cup Dried chilies, 1/4 cup Peanuts", optional: "Garlic, Salt", proteins: ["Red Meat", "Seafood"], veggies: ["Root Vegetables"], mood: ["Spicy", "Nutty", "Smoky"], flavor: ["Latin"] },
  { name: "🇲🇦 Red Harissa", recipe: "1 cup Roasted red peppers, 3 tbsp Olive oil, 2 tsp Cumin", optional: "Lemon juice", proteins: ["Red Meat", "Legumes"], veggies: ["Nightshades"], mood: ["Spicy", "Smoky"], flavor: ["African"] },
  { name: "🇮🇹 Basil Pesto", recipe: "2 cups Fresh basil, 1/2 cup Olive oil, 1/2 cup Parmesan", optional: "Pine nuts, Garlic", proteins: ["Poultry", "Seafood"], veggies: ["Nightshades"], mood: ["Fresh", "Nutty"], flavor: ["Mediterranean"] },
  { name: "🇦🇷 Chimichurri Verde", recipe: "1 cup Parsley, 1/2 cup Olive oil, 1/4 cup Vinegar", optional: "Oregano, Garlic", proteins: ["Red Meat"], veggies: ["Root Vegetables"], mood: ["Fresh", "Bold"], flavor: ["Latin"] },
  { name: "🇱🇧 Toum (Garlic Cloud)", recipe: "1 cup Garlic, 3 cups Oil, 1/2 cup Lemon juice", optional: "Ice water", proteins: ["Poultry", "Red Meat"], veggies: ["Root Vegetables"], mood: ["Creamy", "Bold"], flavor: ["Middle East"] },
  { name: "🇬🇷 Classic Tzatziki", recipe: "1 cup Greek yogurt, 1/2 cup Cucumber, 2 tbsp Lemon juice", optional: "Garlic, Dill", proteins: ["Red Meat", "Poultry"], veggies: ["Nightshades"], mood: ["Creamy", "Fresh"], flavor: ["Mediterranean"] },
  { name: "🇹🇭 Peanut Satay", recipe: "1/2 cup Peanut butter, 1/4 cup Coconut milk, 2 tbsp Soy", optional: "Lime, Chili paste", proteins: ["Poultry", "Tofu"], veggies: ["Cruciferous"], mood: ["Nutty", "Creamy"], flavor: ["Asian"] },
  { name: "🇯🇵 Miso-Ginger Glaze", recipe: "3 tbsp White miso, 2 tbsp Mirin, 1 tbsp Ginger", optional: "Rice vinegar", proteins: ["Seafood", "Tofu"], veggies: ["Cruciferous"], mood: ["Umami", "Fresh"], flavor: ["Asian"] },
  { name: "🇻🇳 Nuoc Cham", recipe: "1/4 cup Lime juice, 1/4 cup Fish sauce, 2 tbsp Sugar", optional: "Garlic, Chili", proteins: ["Pork", "Seafood"], veggies: ["Leafy Greens"], mood: ["Citrusy", "Umami"], flavor: ["Asian"] },
  { name: "🇺🇸 Bourbon BBQ", recipe: "1 cup Ketchup, 1/4 cup Cider vinegar, 2 tbsp Bourbon", optional: "Brown sugar", proteins: ["Red Meat", "Pork"], veggies: ["Root Vegetables"], mood: ["Smoky", "Bold"], flavor: ["USA"] }
];

const currentFilters = { mood: 'All', flavor: 'All', protein: 'All', veggie: 'All' };

function toggleMenu(id) {
  const menu = document.getElementById(id);
  const isOpen = menu.classList.contains('show');
  document.querySelectorAll('.filter-menu').forEach(m => m.classList.remove('show'));
  if (!isOpen) menu.classList.add('show');
}

// Close menus when clicking outside
window.onclick = function(event) {
  if (!event.target.matches('.filter-trigger')) {
    document.querySelectorAll('.filter-menu').forEach(m => m.classList.remove('show'));
  }
}

function init() {
  const sets = { mood: new Set(), flavor: new Set(), protein: new Set(), veggie: new Set() };
  const container = document.getElementById('cardContainer');

  sauces.forEach(s => {
    s.mood.forEach(m => sets.mood.add(m));
    s.flavor.forEach(f => sets.flavor.add(f));
    s.proteins.forEach(p => sets.protein.add(p));
    s.veggies.forEach(v => sets.veggie.add(v));

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.info = JSON.stringify({mood: s.mood, flavor: s.flavor, protein: s.proteins, veggie: s.veggies});
    card.innerHTML = `
      <h3>${s.name}</h3>
      <div class="recipe-box"><label>Recipe</label><p>${s.recipe}</p></div>
      <div class="recipe-box"><label>Enhance</label><p>${s.optional}</p></div>
      <div class="pairing-info">
        <strong>Pairs With</strong>
        <div>${s.proteins.join(' • ')}</div>
        <div>${s.veggies.join(' • ')}</div>
      </div>
      <div class="badge-row">
        ${s.mood.map(m => `<span class="badge tag-${m}">${m}</span>`).join('')}
        ${s.flavor.map(f => `<span class="badge tag-Flavor">${f}</span>`).join('')}
      </div>
    `;
    container.appendChild(card);
  });

  Object.keys(sets).forEach(key => populateMenu(key, sets[key]));
}

function populateMenu(type, data) {
  const menu = document.getElementById(type + 'Menu');
  const trigger = menu.previousElementSibling;
  
  // Create "All" option
  const allOpt = document.createElement('div');
  allOpt.className = 'filter-option selected';
  allOpt.textContent = 'All ' + (type === 'veggie' ? 'Veggies' : type.charAt(0).toUpperCase() + type.slice(1) + 's');
  allOpt.onclick = () => selectOption(type, 'All', allOpt.textContent);
  menu.appendChild(allOpt);

  Array.from(data).sort().forEach(val => {
    const opt = document.createElement('div');
    opt.className = 'filter-option';
    opt.textContent = val;
    opt.onclick = () => selectOption(type, val, val);
    menu.appendChild(opt);
  });
}

function selectOption(type, val, label) {
  currentFilters[type] = val;
  const menu = document.getElementById(type + 'Menu');
  const trigger = menu.previousElementSibling;
  trigger.textContent = label;

  // Visual feedback for selected
  Array.from(menu.children).forEach(child => child.classList.toggle('selected', child.textContent === label));

  updateUI();
}

function updateUI() {
  // Filter Cards
  document.querySelectorAll('.card').forEach(card => {
    const data = JSON.parse(card.dataset.info);
    const match = (currentFilters.mood === 'All' || data.mood.includes(currentFilters.mood)) &&
                  (currentFilters.flavor === 'All' || data.flavor.includes(currentFilters.flavor)) &&
                  (currentFilters.protein === 'All' || data.protein.includes(currentFilters.protein)) &&
                  (currentFilters.veggie === 'All' || data.veggie.includes(currentFilters.veggie));
    card.classList.toggle('hidden', !match);
  });

  // Smart Filter Logic: Hide options that lead to 0 results
  Object.keys(currentFilters).forEach(key => {
    const menu = document.getElementById(key + 'Menu');
    const otherKeys = Object.keys(currentFilters).filter(k => k !== key);
    
    const validValues = new Set();
    sauces.forEach(s => {
      const matchOthers = otherKeys.every(k => {
        const checkKey = k === 'veggie' ? 'veggies' : (k === 'protein' ? 'proteins' : k);
        return currentFilters[k] === 'All' || s[checkKey].includes(currentFilters[k]);
      });
      if (matchOthers) {
        const dataKey = key === 'veggie' ? 'veggies' : (key === 'protein' ? 'proteins' : key);
        s[dataKey].forEach(v => validValues.add(v));
      }
    });

    Array.from(menu.children).forEach(opt => {
      if (opt.textContent.startsWith('All')) return;
      opt.classList.toggle('disabled', !validValues.has(opt.textContent));
    });
  });
}

init();
</script>
</body>
</html>
