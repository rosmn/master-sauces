<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Sauce & Marinade Picker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>🥫</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap');

  body {
    margin: 0;
    padding: 20px;
    font-family: 'Montserrat', sans-serif;
    background: #000;
    color: #eee;
  }

  h1 { text-align: center; margin-bottom: 30px; font-size: 1.8rem; color: #fff; font-weight: 600; }

  .filters {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin-bottom: 40px;
  }

  select {
    padding: 12px 18px;
    font-size: 14px;
    border-radius: 12px;
    border: 1px solid #333;
    background: rgba(255, 255, 255, 0.05);
    color: #fff;
    cursor: pointer;
    min-width: 185px;
    outline: none;
  }
  select:hover { border-color: #555; }
  select option { background: #111; color: #fff; }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 25px;
    max-width: 1500px;
    margin: 0 auto;
  }

  .card {
    background: #000;
    border-radius: 20px;
    padding: 25px;
    border: 1px solid #222;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s, border-color 0.2s;
  }
  .card:hover { border-color: #444; transform: translateY(-3px); }

  .card h3 { margin: 0 0 15px; font-size: 19px; color: #fff; font-weight: 600; border-bottom: 1px solid #222; padding-bottom: 10px; }
  .card p { margin: 8px 0; font-size: 13px; line-height: 1.6; color: #aaa; }
  .card p strong { color: #fff; font-weight: 600; margin-right: 6px; }
  
  .badge-container { margin-top: auto; padding-top: 15px; display: flex; flex-wrap: wrap; gap: 8px; }
  .badge { padding: 5px 12px; border-radius: 10px; font-size: 11px; font-weight: 600; color: #fff; text-transform: uppercase; }

  /* UI Colors */
  .bg-Spicy { background: #ff4c4c; }
  .bg-Fresh { background: #1ed760; }
  .bg-Citrusy { background: #ffb84c; }
  .bg-Umami { background: #4c9cff; }
  .bg-Creamy { background: #d84cff; }
  .bg-Smoky { background: #777; }
  .bg-Nutty { background: #8e44ad; }
  .bg-Bold { background: #e74c3c; }

  .bg-Asian { background: #ff6e40; }
  .bg-Latin { background: #ffcc29; color: #000; }
  .bg-Mediterranean { background: #2ed3c2; color: #000; }
  .bg-African { background: #e67e22; }
  .bg-USA { background: #ff5e78; }
  .bg-MiddleEast { background: #9b59b6; }
  .bg-EasternEurope { background: #95a5a6; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<h1>Master Sauce Picker</h1>

<div class="filters">
  <select id="moodFilter"><option value="All">All Moods</option></select>
  <select id="flavorFilter"><option value="All">All Flavours</option></select>
  <select id="proteinFilter"><option value="All">All Proteins</option></select>
  <select id="veggieFilter"><option value="All">All Vegetables</option></select>
</div>

<div id="cardContainer" class="cards"></div>

<script>
const sauces = [
  {
    name: "🇰🇷 Classic Gochujang",
    recipe: "3 tbsp Gochujang, 2 tbsp Soy sauce, 1 tbsp Rice vinegar, 1 tbsp Honey, 1 tsp Sesame oil",
    optional: "Minced garlic, Scallions",
    proteins: ["Poultry", "Red Meat", "Tofu"],
    veggies: ["Cruciferous", "Root Vegetables"],
    mood: ["Spicy", "Umami"],
    flavor: ["Asian"]
  },
  {
    name: "🇦🇷 Chimichurri Rojo",
    recipe: "1/2 cup Parsley, 1/3 cup Olive oil, 2 tbsp Red wine vinegar, 1 tbsp Smoked paprika, 3 cloves Garlic",
    optional: "Dried oregano, Red pepper flakes",
    proteins: ["Red Meat", "Seafood"],
    veggies: ["Nightshades", "Root Vegetables"],
    mood: ["Fresh", "Bold"],
    flavor: ["Latin"]
  },
  {
    name: "🇱🇧 Creamy Tahini-Lemon",
    recipe: "1/2 cup Tahini, 1/4 cup Warm water, 3 tbsp Lemon juice, 2 cloves Garlic, 1/2 tsp Salt",
    optional: "Ground cumin, Fresh parsley",
    proteins: ["Legumes", "Poultry", "Red Meat"],
    veggies: ["Nightshades", "Root Vegetables"],
    mood: ["Creamy"],
    flavor: ["Middle East"]
  },
  {
    name: "🇯🇵 Miso-Ginger Glaze",
    recipe: "3 tbsp White miso, 2 tbsp Mirin, 1 tbsp Soy sauce, 1 tbsp Grated ginger, 1 tsp Brown sugar",
    optional: "Rice vinegar, Scallions",
    proteins: ["Seafood", "Tofu", "Poultry"],
    veggies: ["Nightshades", "Cruciferous"],
    mood: ["Umami", "Fresh"],
    flavor: ["Asian"]
  },
  {
    name: "🇬🇷 Authentic Tzatziki",
    recipe: "1 cup Greek yogurt, 1/2 grated Cucumber, 2 tbsp Lemon juice, 1 tbsp Olive oil, 2 cloves Garlic",
    optional: "Fresh dill, Mint",
    proteins: ["Red Meat", "Poultry"],
    veggies: ["Root Vegetables", "Nightshades"],
    mood: ["Creamy", "Fresh"],
    flavor: ["Mediterranean"]
  },
  {
    name: "🇹🇭 Peanut Satay",
    recipe: "1/2 cup Peanut butter, 1/4 cup Coconut milk, 2 tbsp Soy sauce, 1 tbsp Lime juice, 1 tsp Red curry paste",
    optional: "Brown sugar, Ginger",
    proteins: ["Poultry", "Tofu", "Red Meat"],
    veggies: ["Root Vegetables", "Cruciferous"],
    mood: ["Nutty", "Creamy"],
    flavor: ["Asian"]
  },
  {
    name: "🇲🇦 Zesty Chermoula",
    recipe: "1/2 cup Cilantro, 1/2 cup Parsley, 1/3 cup Olive oil, 2 tbsp Lemon juice, 2 tsp Cumin",
    optional: "Paprika, Chili flakes",
    proteins: ["Seafood", "Poultry", "Legumes"],
    veggies: ["Nightshades", "Root Vegetables"],
    mood: ["Fresh", "Citrusy"],
    flavor: ["African"]
  },
  {
    name: "🇲🇽 Chipotle Adobo",
    recipe: "3 Chipotles in adobo, 1/4 cup Olive oil, 2 tbsp Lime juice, 1 tsp Cumin, 1 tsp Garlic powder",
    optional: "Honey, Dried oregano",
    proteins: ["Red Meat", "Poultry"],
    veggies: ["Root Vegetables", "Nightshades"],
    mood: ["Smoky", "Spicy"],
    flavor: ["Latin"]
  },
  {
    name: "🇻🇳 Classic Nuoc Cham",
    recipe: "1/4 cup Water, 2 tbsp Lime juice, 2 tbsp Sugar, 1.5 tbsp Fish sauce, 1 clove Garlic",
    optional: "Bird's eye chili, Shredded carrots",
    proteins: ["Red Meat", "Seafood", "Poultry"],
    veggies: ["Leafy Greens", "Root Vegetables"],
    mood: ["Umami", "Citrusy"],
    flavor: ["Asian"]
  },
  {
    name: "🇿🇦 African Peri-Peri",
    recipe: "1/2 cup Olive oil, 1/4 cup Lemon juice, 4 Birds eye chilies, 3 cloves Garlic, 2 tsp Smoked paprika",
    optional: "Dried oregano, Onion powder",
    proteins: ["Poultry", "Seafood"],
    veggies: ["Root Vegetables", "Cruciferous"],
    mood: ["Spicy", "Citrusy"],
    flavor: ["African"]
  },
  {
    name: "🇺🇸 Classic BBQ",
    recipe: "1 cup Ketchup, 1/4 cup Apple cider vinegar, 2 tbsp Brown sugar, 1 tbsp Mustard, 1 tsp Smoked paprika",
    optional: "Worcestershire sauce, Garlic powder",
    proteins: ["Red Meat", "Poultry"],
    veggies: ["Root Vegetables", "Cruciferous"],
    mood: ["Smoky", "Bold"],
    flavor: ["USA"]
  },
  {
    name: "🇮🇹 Italian Salsa Verde",
    recipe: "1 cup Flat parsley, 1/2 cup Olive oil, 2 tbsp Capers, 1 tbsp Lemon juice, 2 cloves Garlic",
    optional: "Anchovies, Red pepper flakes",
    proteins: ["Seafood", "Red Meat", "Poultry"],
    veggies: ["Nightshades", "Cruciferous"],
    mood: ["Fresh", "Bold"],
    flavor: ["Mediterranean"]
  },
  {
    name: "🇪🇸 Romesco Sauce",
    recipe: "2 Roasted red peppers, 1/2 cup Toasted almonds, 1/4 cup Olive oil, 1 tbsp Sherry vinegar, 1 clove Garlic",
    optional: "Smoked paprika, Tomato paste",
    proteins: ["Seafood", "Poultry"],
    veggies: ["Cruciferous", "Nightshades"],
    mood: ["Nutty", "Smoky"],
    flavor: ["Mediterranean"]
  },
  {
    name: "🇯🇵 Teriyaki Glaze",
    recipe: "1/2 cup Soy sauce, 1/4 cup Water, 3 tbsp Brown sugar, 1 tbsp Mirin, 1 tsp Grated ginger",
    optional: "Cornstarch (for thickening), Garlic",
    proteins: ["Poultry", "Seafood", "Tofu"],
    veggies: ["Cruciferous", "Root Vegetables"],
    mood: ["Umami", "Bold"],
    flavor: ["Asian"]
  },
  {
    name: "🇵🇪 Aji Amarillo Sauce",
    recipe: "1/2 cup Aji Amarillo paste, 1/2 cup Mayonnaise, 1 tbsp Lime juice, 1 clove Garlic, 1 tsp Salt",
    optional: "Cilantro, Huacatay herb",
    proteins: ["Poultry", "Seafood", "Red Meat"],
    veggies: ["Root Vegetables", "Nightshades"],
    mood: ["Creamy", "Spicy"],
    flavor: ["Latin"]
  },
  {
    name: "🇭🇺 Paprika-Garlic Oil",
    recipe: "1/2 cup Sunflower oil, 2 tbsp Sweet Hungarian paprika, 4 cloves Garlic (minced), 1 tsp Salt",
    optional: "Hot paprika, Lemon zest",
    proteins: ["Red Meat", "Poultry"],
    veggies: ["Root Vegetables", "Cruciferous"],
    mood: ["Smoky", "Bold"],
    flavor: ["Eastern Europe"]
  },
  {
    name: "🇫🇷 Classic Peppercorn",
    recipe: "1/2 cup Heavy cream, 1/4 cup Beef stock, 2 tbsp Crushed black peppercorns, 1 tbsp Butter, 1 tsp Brandy",
    optional: "Shallots, Dijon mustard",
    proteins: ["Red Meat"],
    veggies: ["Root Vegetables", "Nightshades"],
    mood: ["Creamy", "Bold"],
    flavor: ["Mediterranean"]
  },
  {
    name: "🇬🇪 Bazhe Walnut Sauce",
    recipe: "1 cup Walnuts, 1/2 cup Warm water, 2 cloves Garlic, 1 tsp Coriander, 1 tsp Turmeric",
    optional: "Red wine vinegar, Chili flakes",
    proteins: ["Poultry", "Tofu"],
    veggies: ["Cruciferous", "Nightshades"],
    mood: ["Nutty", "Creamy"],
    flavor: ["Eastern Europe"]
  }
];

const filterEls = {
  mood: document.getElementById('moodFilter'),
  flavor: document.getElementById('flavorFilter'),
  protein: document.getElementById('proteinFilter'),
  veggie: document.getElementById('veggieFilter')
};

function init() {
  const container = document.getElementById('cardContainer');
  const sets = { mood: new Set(), flavor: new Set(), protein: new Set(), veggie: new Set() };

  sauces.forEach(s => {
    s.mood.forEach(m => sets.mood.add(m));
    s.flavor.forEach(f => sets.flavor.add(f));
    s.proteins.forEach(p => sets.protein.add(p));
    s.veggies.forEach(v => sets.veggie.add(v));

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.info = JSON.stringify({mood: s.mood, flavor: s.flavor, protein: s.proteins, veggie: s.veggies});
    card.innerHTML = `
      <h3>${s.name}</h3>
      <p><strong>Recipe:</strong> ${s.recipe}</p>
      <p><strong>Optional:</strong> ${s.optional}</p>
      <p><strong>Pairs With:</strong> ${s.proteins.join(', ')} & ${s.veggies.join(', ')}</p>
      <div class="badge-container">
        ${s.mood.map(m => `<span class="badge bg-${m}">${m}</span>`).join('')}
        ${s.flavor.map(f => `<span class="badge bg-${f.replace(/\s/g, '')}">${f}</span>`).join('')}
      </div>
    `;
    container.appendChild(card);
  });

  Object.keys(sets).forEach(key => populate(filterEls[key], sets[key]));
  Object.values(filterEls).forEach(el => el.addEventListener('change', update));
}

function populate(select, data) {
  Array.from(data).sort().forEach(val => {
    const opt = document.createElement('option');
    opt.value = val;
    opt.textContent = val;
    select.appendChild(opt);
  });
}

function update() {
  const current = {
    mood: filterEls.mood.value,
    flavor: filterEls.flavor.value,
    protein: filterEls.protein.value,
    veggie: filterEls.veggie.value
  };

  document.querySelectorAll('.card').forEach(card => {
    const data = JSON.parse(card.dataset.info);
    const match = (current.mood === 'All' || data.mood.includes(current.mood)) &&
                  (current.flavor === 'All' || data.flavor.includes(current.flavor)) &&
                  (current.protein === 'All' || data.protein.includes(current.protein)) &&
                  (current.veggie === 'All' || data.veggie.includes(current.veggie));
    card.classList.toggle('hidden', !match);
  });

  // Smart Filter Logic
  Object.keys(filterEls).forEach(key => {
    const select = filterEls[key];
    const otherFilters = Object.keys(filterEls).filter(k => k !== key);
    
    const validValues = new Set();
    sauces.forEach(s => {
      const matchOthers = otherFilters.every(k => {
        const checkKey = k === 'veggie' ? 'veggies' : (k === 'protein' ? 'proteins' : k);
        return current[k] === 'All' || s[checkKey].includes(current[k]);
      });
      if (matchOthers) {
        const dataKey = key === 'veggie' ? 'veggies' : (key === 'protein' ? 'proteins' : key);
        s[dataKey].forEach(v => validValues.add(v));
      }
    });

    Array.from(select.options).forEach(opt => {
      if (opt.value === 'All') return;
      const ok = validValues.has(opt.value);
      opt.style.display = ok ? 'block' : 'none';
      opt.disabled = !ok;
    });
  });
}

init();
</script>
</body>
</html>
