<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Sauce/Dressing/Marinade Picker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>🥫</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap');

  body {
    margin: 0;
    padding: 20px;
    font-family: 'Montserrat', sans-serif;
    background: #121212;
    color: #eee;
  }

  h1 {
    text-align: center;
    font-weight: 600;
    margin-bottom: 20px;
    font-size: 1.5rem;
    color: #fff;
  }

  .filters {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  select {
    padding: 10px 15px;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    backdrop-filter: blur(6px);
    cursor: pointer;
    min-width: 140px;
    transition: background 0.3s;
  }

  select:hover {
    background: rgba(255,255,255,0.2);
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  .card {
    background: #000;
    border-radius: 20px;
    padding: 15px 20px;
    border: 1px solid #555;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.7);
  }

  .card h3 {
    margin: 0 0 10px;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
  }

  .card p {
    margin: 5px 0;
    font-size: 14px;
    color: #ccc;
  }

  .badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 8px;
    font-size: 12px;
    margin-right: 5px;
    margin-bottom: 5px;
    color: #fff;
    font-weight: 500;
  }

  .mood__color-Spicy { background: #ff4c4c; }
  .mood__color-Fresh { background: #1ed760; }
  .mood__color-Citrusy { background: #ffb84c; }
  .mood__color-Umami { background: #4c9cff; }
  .mood__color-Creamy { background: #d84cff; }
  .mood__color-Smoky { background: #777; }

  .flavor__color-Asian { background: #ff6e40; }
  .flavor__color-Latin { background: #ffcc29; color:#000; }
  .flavor__color-Mediterranean { background: #2ed3c2; color:#000; }
  .flavor__color-African { background: #ff7f50; }
  .flavor__color-USA { background: #ff5e78; }
  .flavor__color-MiddleEast { background: #9b59b6; }
  .flavor__color-EasternEurope { background: #95a5a6; }

  @media (max-width: 500px) {
    .filters {
      flex-direction: column;
      align-items: center;
    }
    select {
      width: 90%;
    }
  }
</style>
</head>
<body>
<h1>Master Sauce/Dressing/Marinade Picker</h1>
<div class="filters">
  <select id="moodFilter">
    <option value="All">All</option>
    <option value="Spicy">Spicy</option>
    <option value="Fresh">Fresh</option>
    <option value="Citrusy">Citrusy</option>
    <option value="Umami">Umami</option>
    <option value="Creamy">Creamy</option>
    <option value="Smoky">Smoky</option>
  </select>
  <select id="flavorFilter">
    <option value="All">All</option>
    <option value="Asian">Asian</option>
    <option value="Latin">Latin</option>
    <option value="Mediterranean">Mediterranean</option>
    <option value="African">African</option>
    <option value="USA">USA</option>
    <option value="Middle East">Middle East</option>
    <option value="Eastern Europe">Eastern Europe</option>
  </select>
  <select id="veggieFilter">
    <option value="All">All</option>
    <option value="cucumbers">Cucumbers</option>
    <option value="potatoes">Potatoes</option>
    <option value="sweet potatoes">Sweet Potatoes</option>
    <option value="carrots">Carrots</option>
    <option value="tomatoes">Tomatoes</option>
    <option value="lettuce">Lettuce</option>
    <option value="cabbage">Cabbage</option>
    <option value="celery">Celery</option>
    <option value="green beans">Green Beans</option>
  </select>
</div>
<div class="cards" id="cardContainer"></div>
<script>
const sauces = [
  {name:"🇰🇷 Gochujang Spicy", main:"gochujang, soy, vinegar", optional:"garlic, honey, sesame oil", veggies:"cabbage, carrots, cucumbers", mood:"Spicy", flavor:"Asian"},
  {name:"🌶 Lime–Chili", main:"lime, chili, garlic", optional:"cilantro, onion", veggies:"cucumbers, carrots, tomatoes", mood:"Spicy / Citrusy", flavor:"Latin"},
  {name:"🇿🇦 Peri-Peri", main:"chili, lemon, garlic, oil", optional:"smoked paprika, vinegar", veggies:"potatoes, sweet potatoes, cabbage", mood:"Spicy / Smoky / Citrusy", flavor:"African"},
  {name:"🇺🇸 Sriracha-Mayo Light", main:"light mayo, sriracha, lemon", optional:"garlic", veggies:"potatoes, sweet potatoes, carrots", mood:"Spicy / Creamy", flavor:"USA"},
  {name:"🇮🇹 Olive Oil–Lemon Herb", main:"olive oil, lemon, garlic", optional:"oregano, parsley", veggies:"tomatoes, lettuce, cucumbers", mood:"Fresh / Citrusy", flavor:"Mediterranean"},
  {name:"🇬🇷 Garlic Herb", main:"olive oil, garlic, herbs", optional:"lemon, pepper", veggies:"tomatoes, lettuce, carrots", mood:"Fresh", flavor:"Mediterranean"},
  {name:"🇯🇵 Mojo Verde", main:"cilantro, oil, vinegar", optional:"garlic, cumin", veggies:"potatoes, carrots", mood:"Fresh / Spicy", flavor:"Latin"},
  {name:"🇯🇵 Soy–Ginger", main:"soy sauce, ginger, garlic", optional:"sesame oil, honey", veggies:"cabbage, broccoli, green beans", mood:"Umami", flavor:"Asian"},
  {name:"🇯🇵 Miso–Umami", main:"miso, vinegar, soy", optional:"ginger, sesame", veggies:"cabbage, carrots, potatoes", mood:"Umami", flavor:"Asian"},
  {name:"🇯🇵 Sweet Soy / Teriyaki", main:"soy, sugar, vinegar", optional:"ginger, garlic", veggies:"carrots, broccoli, beans", mood:"Umami", flavor:"Asian"},
  {name:"🇯🇵 Miso–Tahini", main:"miso, tahini, lemon", optional:"garlic, ginger", veggies:"carrots, cabbage, potatoes", mood:"Creamy / Umami", flavor:"Asian / Middle East"},
  {name:"🕌 Tahini–Garlic", main:"tahini, lemon, garlic", optional:"cumin, parsley", veggies:"carrots, cabbage, cucumbers", mood:"Creamy / Garlicky", flavor:"Middle East"},
  {name:"🇬🇷 Tzatziki-Style", main:"yogurt, cucumber, garlic", optional:"dill, mint", veggies:"cucumbers, carrots, potatoes", mood:"Creamy / Fresh", flavor:"Mediterranean"},
  {name:"🇺🇸 BBQ Style", main:"tomato paste, vinegar, sugar", optional:"paprika, mustard", veggies:"potatoes, cabbage", mood:"Smoky", flavor:"USA"},
  {name:"🇭🇺 Paprika–Garlic", main:"paprika, garlic, oil", optional:"vinegar, lemon", veggies:"potatoes, cabbage, carrots", mood:"Smoky / Garlicky", flavor:"Eastern Europe"},
  {name:"🇧🇷 Brazilian Chimichurri", main:"parsley oil, garlic, red wine vinegar, cumin", optional:"mint, oregano", veggies:"arugula, bell peppers, red onions", mood:"Bold / Herby", flavor:"Latin"},
  {name:"🇹🇭 Thai Satay Peanut Sauce", main:"roasted peanuts, tamarind paste, soy sauce", optional:"sesame seeds, chili flakes", veggies:"green beans, carrots, jicama", mood:"Nutty / Savory", flavor:"Southeast Asian"},
  {name:"🇪🇬 Egyptian Harissa", main:"smoked chili, garlic, cumin, coriander", optional:"lemon juice, olive oil", veggies:"eggplant, zucchini, tomatoes", mood:"Smoky / Spicy", flavor:"North African"},
  {name:"🇫🇷 French Béarnaise", main:"butter, egg yolks, tarragon, white wine vinegar", optional:"shallots, chives", veggies:"asparagus, artichokes, steak", mood:"Rich / Creamy", flavor:"Classical"},
  {name:"🇲🇽 Mexican Adobo", main:"oregano, garlic, cumin, citrus zest", optional:"clove, cinnamon", veggies:"beans, squash, chicken", mood:"Earthy / Aromatic", flavor:"Traditional"},
  {name:"🇮🇹 Italian Aglio e Olio", main:"garlic, olive oil, chili flakes, parsley", optional:"lemon zest, capers", veggies:"spaghetti, broccoli, cherry tomatoes", mood:"Simple / Fresh", flavor:"Mediterranean"}
];
const container = document.getElementById('cardContainer');

// Derive distinct values for each filter, including 'All' as default
const moodsSet = new Set(['All']);
const flavorsSet = new Set(['All']);
const veggiesSet = new Set(['All']);

sauces.forEach(s => {
  s.mood.split('/').forEach(m => moodsSet.add(m.trim()));
  s.flavor.split('/').forEach(f => flavorsSet.add(f.trim()));
  s.veggies.split(',').forEach(v => veggiesSet.add(v.trim()));
});
const distinctMoods = Array.from(moodsSet);
const distinctFlavors = Array.from(flavorsSet);
const distinctVeggies = Array.from(veggiesSet);

// Helper: populate a <select> with given options and optionally set a selected value
function populateSelect(selectEl, options, selectedValue = 'All') {
  selectEl.innerHTML = '';
  options.forEach(opt => {
    const optionEl = document.createElement('option');
    optionEl.value = opt;
    optionEl.textContent = opt;
    if (opt === selectedValue) {
      optionEl.selected = true;
    }
    selectEl.appendChild(optionEl);
  });
}

// Determine if a given combination of filter values yields any matching sauces
function wouldHaveMatches(moodVal, flavorVal, veggieVal) {
  return sauces.some(s => {
    const cardMoods = s.mood.split('/').map(m => m.trim());
    const cardFlavors = s.flavor.split('/').map(f => f.trim());
    const cardVeggies = s.veggies.split(',').map(v => v.trim().toLowerCase());

    const moodMatch = (moodVal === 'All') || cardMoods.includes(moodVal);
    const flavorMatch = (flavorVal === 'All') || cardFlavors.includes(flavorVal);
    const veggieMatch = (veggieVal === 'All') || cardVeggies.includes(veggieVal.toLowerCase());

    return moodMatch && flavorMatch && veggieMatch;
  });
}

// Hide/show options in a select that would not lead to any matches when selected
function updateOptionVisibility(selectId) {
  const select = document.getElementById(selectId);
  const currentValue = select.value; // currently selected option

  Array.from(select.options).forEach(option => {
    // Always keep 'All' visible for resetting
    if (option.value === 'All') {
      option.style.display = '';
      return;
    }

    // Keep the currently selected option visible
    if (option.value === currentValue) {
      option.style.display = '';
      return;
    }

    // Simulate selecting this option while preserving other filter values
    const simulatedValue = option.value;
    const tempFilters = {
      moodFilter: selectId === 'moodFilter' ? simulatedValue : document.getElementById('moodFilter').value,
      flavorFilter: selectId === 'flavorFilter' ? simulatedValue : document.getElementById('flavorFilter').value,
      veggieFilter: selectId === 'veggieFilter' ? simulatedValue : document.getElementById('veggieFilter').value,
    };

    const wouldMatch = wouldHaveMatches(
      tempFilters.moodFilter,
      tempFilters.flavorFilter,
      tempFilters.veggieFilter
    );

    // Hide option if it would yield no matches
    option.style.display = wouldMatch ? '' : 'none';
  });
}

// Render all cards into the container
function renderCards() {
  container.innerHTML = ''; // Clear existing
  sauces.forEach(sauce => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.mood = sauce.mood;
    card.dataset.flavor = sauce.flavor;
    card.dataset.veggies = sauce.veggies;

    const moodBrackets = sauce.mood.split('/').map(m => `mood__color-${m.trim()}`).join(' ');
    const flavorBrackets = sauce.flavor.split('/').map(f => `flavor__color-${f.trim().replace(/ /g,'')}`).join(' ');

    card.innerHTML = `
      <h3>${sauce.name}</h3>
      <p><strong>Main:</strong> ${sauce.main}</p>
      <p><strong>Optional:</strong> ${sauce.optional}</p>
      <p><strong>Veggies:</strong> ${sauce.veggies}</p>
      <div>
        <span class="badge ${moodBrackets}">${sauce.mood}</span>
        <span class="badge ${flavorBrackets}">${sauce.flavor}</span>
      </div>
    `;
    container.appendChild(card);
  });
}

// Filter cards according to current selections and update option visibility
function filterCards() {
  renderCards(); // Ensure cards exist before filtering

  const mood = document.getElementById('moodFilter').value;
  const flavor = document.getElementById('flavorFilter').value;
  const veggie = document.getElementById('veggieFilter').value;

  const cards = container.querySelectorAll('.card');

  let anyVisible = false;
  cards.forEach(card => {
    const cardMoods = card.dataset.mood.split('/').map(m => m.trim());
    const cardFlavors = card.dataset.flavor.split('/').map(f => f.trim());
    const cardVeggies = card.dataset.veggies.split(',').map(v => v.trim().toLowerCase());

    const moodMatch = (mood === 'All') || cardMoods.includes(mood);
    const flavorMatch = (flavor === 'All') || cardFlavors.includes(flavor);
    const veggieMatch = (veggie === 'All') || cardVeggies.includes(veggie.toLowerCase());

    card.style.display = (moodMatch && flavorMatch && veggieMatch) ? 'flex' : 'none';
    if (moodMatch && flavorMatch && veggieMatch) anyVisible = true;
  });

  // After filtering, adjust visibility of each filter's options
  ['moodFilter', 'flavorFilter', 'veggieFilter'].forEach(id => updateOptionVisibility(id));

  return anyVisible;
}

// Initialize the UI: populate selects and attach listeners
function initUI() {
  const moodSelect = document.getElementById('moodFilter');
  const flavorSelect = document.getElementById('flavorFilter');
  const veggieSelect = document.getElementById('veggieFilter');

  populateSelect(moodSelect, distinctMoods, 'All');
  populateSelect(flavorSelect, distinctFlavors, 'All');
  populateSelect(veggieSelect, distinctVeggies, 'All');

  // Attach change listeners
  moodSelect.addEventListener('change', filterCards);
  flavorSelect.addEventListener('change', filterCards);
  veggieSelect.addEventListener('change', filterCards);

  // Initial render
  filterCards();
}

// Run initialization
initUI();
</script>
</body>
</html>
