<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sauce Pantry</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Kitchen-Inspired Palette: High Contrast & Warmth */
    --bg: #12100e;            /* Deep Espresso */
    --surface: #1e1c1a;       /* Dark Chocolate */
    --card-inner: #282522;    /* Toasted Nut */
    --accent: #e2b17a;        /* Golden Honey */
    --text-primary: #fdfaf5;  /* Clean Cream */
    --text-secondary: #b0a8a0;/* Warm Grey */
    
    /* Vibrant Mood Colors */
    --spicy: #ff4d4d;    --fresh: #22c55e;
    --citrusy: #eab308;  --umami: #3b82f6;
    --creamy: #a855f7;   --smoky: #94a3b8;
    --nutty: #f97316;    --bold: #ec4899;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.5;
  }

  /* Fixed Header Area */
  .header-container {
    background: var(--bg);
    padding: 30px 20px 10px;
    text-align: center;
    border-bottom: 1px solid #2d2a27;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    margin: 0;
    color: var(--accent);
  }

  /* Responsive Filter Bar */
  .filter-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    padding: 15px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
  }

  .select-group {
    flex: 1;
    min-width: 140px; /* On desktop they sit side-by-side */
    width: 100%;     /* On mobile they stack */
    position: relative;
  }

  select {
    width: 100%;
    background: var(--surface);
    color: var(--text-primary);
    border: 1px solid #3d3a37;
    padding: 14px 15px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    appearance: none;
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus { border-color: var(--accent); }

  /* Main Content Area */
  .container {
    padding: 20px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .recipe-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border-radius: 20px;
    padding: 25px;
    display: flex;
    flex-direction: column;
    border: 1px solid #2d2a27;
    transition: transform 0.2s;
  }

  .card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    margin: 0 0 15px;
    line-height: 1.2;
  }

  .recipe-box {
    background: var(--card-inner);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 12px;
  }

  .recipe-box label {
    display: block;
    color: var(--accent);
    font-size: 11px;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 5px;
    letter-spacing: 0.5px;
  }

  .recipe-box p {
    margin: 0;
    font-size: 14px;
    color: #efefef;
    line-height: 1.4;
  }

  .pairing-info {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 10px;
  }

  .pairing-info div { margin-bottom: 4px; }
  .pairing-info strong { color: #888; font-size: 11px; text-transform: uppercase; }

  /* Mood Badges - Bold and distinguishable */
  .badge-row {
    margin-top: auto;
    padding-top: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .badge {
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    color: #fff;
  }

  .tag-Spicy { background: var(--spicy); }
  .tag-Fresh { background: var(--fresh); }
  .tag-Citrusy { background: var(--citrusy); }
  .tag-Umami { background: var(--umami); }
  .tag-Creamy { background: var(--creamy); }
  .tag-Smoky { background: var(--smoky); }
  .tag-Nutty { background: var(--nutty); }
  .tag-Bold { background: var(--bold); }

  .tag-Flavor { border: 1px solid #444; color: #ccc; }

  .hidden { display: none !important; }

  /* Mobile Overrides */
  @media (max-width: 600px) {
    .filter-bar {
      flex-direction: column; /* Force stack for thumb-friendly clicks */
      padding: 15px;
    }
    .select-group { width: 100%; }
    h1 { font-size: 1.8rem; }
    .card { padding: 20px; }
  }
</style>
</head>
<body>

<div class="header-container">
  <h1>The Sauce Pantry</h1>
</div>

<div class="filter-bar">
  <div class="select-group"><select id="moodFilter"><option value="All">All Moods</option></select></div>
  <div class="select-group"><select id="flavorFilter"><option value="All">All Flavours</option></select></div>
  <div class="select-group"><select id="proteinFilter"><option value="All">All Proteins</option></select></div>
  <div class="select-group"><select id="veggieFilter"><option value="All">All Vegetables</option></select></div>
</div>

<div class="container">
  <div id="cardContainer" class="recipe-grid"></div>
</div>

<script>
const sauces = [
  // Spicy
  { name: "🇰🇷 Gochujang Glaze", recipe: "3 tbsp Gochujang, 2 tbsp Soy sauce, 1 tbsp Honey, 1 tbsp Rice vinegar", optional: "Sesame oil, ginger", proteins: ["Poultry", "Tofu"], veggies: ["Cruciferous", "Root Vegetables"], mood: ["Spicy", "Umami"], flavor: ["Asian"] },
  { name: "🇲🇽 Salsa Macha", recipe: "1 cup Oil, 1/2 cup Dried chilies, 1/4 cup Peanuts, 3 cloves Garlic", optional: "Sesame seeds", proteins: ["Red Meat", "Seafood"], veggies: ["Root Vegetables"], mood: ["Spicy", "Nutty", "Smoky"], flavor: ["Latin"] },
  { name: "🇲🇦 Red Harissa", recipe: "1 cup Roasted red peppers, 3 tbsp Olive oil, 2 tsp Cumin, 1 tsp Coriander", optional: "Lemon juice", proteins: ["Red Meat", "Legumes"], veggies: ["Nightshades"], mood: ["Spicy", "Smoky"], flavor: ["African"] },
  { name: "🇮🇩 Sambal Oelek Style", recipe: "1 cup Red chilies, 2 tbsp Rice vinegar, 1 tsp Salt, 1 tsp Sugar", optional: "Garlic, Lemongrass", proteins: ["Seafood", "Poultry"], veggies: ["Leafy Greens"], mood: ["Spicy", "Fresh"], flavor: ["Asian"] },
  { name: "🇺🇸 Buffalo Wing Sauce", recipe: "1/2 cup Hot sauce, 1/3 cup Melted butter, 1 tbsp White vinegar", optional: "Garlic powder", proteins: ["Poultry", "Seafood"], veggies: ["Cruciferous"], mood: ["Spicy", "Bold"], flavor: ["USA"] },

  // Fresh
  { name: "🇮🇹 Classic Basil Pesto", recipe: "2 cups Basil, 1/2 cup Olive oil, 1/2 cup Parmesan, 1/3 cup Pine nuts", optional: "Garlic, Lemon", proteins: ["Poultry", "Seafood"], veggies: ["Nightshades"], mood: ["Fresh", "Nutty"], flavor: ["Mediterranean"] },
  { name: "🇦🇷 Chimichurri Verde", recipe: "1 cup Parsley, 1/2 cup Olive oil, 1/4 cup Red wine vinegar, 3 cloves Garlic", optional: "Oregano", proteins: ["Red Meat"], veggies: ["Root Vegetables"], mood: ["Fresh", "Bold"], flavor: ["Latin"] },
  { name: "🇮🇳 Mint-Cilantro Chutney", recipe: "1 cup Mint, 1 cup Cilantro, 2 tbsp Lime juice, 1 tbsp Ginger", optional: "Yogurt", proteins: ["Poultry", "Legumes"], veggies: ["Cruciferous"], mood: ["Fresh", "Citrusy"], flavor: ["Asian"] },
  { name: "🇮🇹 Italian Salsa Verde", recipe: "1 cup Parsley, 1/2 cup Olive oil, 2 tbsp Capers, 2 cloves Garlic", optional: "Anchovies", proteins: ["Seafood", "Red Meat"], veggies: ["Cruciferous"], mood: ["Fresh", "Citrusy"], flavor: ["Mediterranean"] },
  { name: "🇲🇽 Fresh Pico Sauce", recipe: "2 cups Tomatoes, 1/2 cup Onion, 1/2 cup Cilantro, 2 tbsp Lime juice", optional: "Jalapeno", proteins: ["Seafood", "Legumes"], veggies: ["Nightshades"], mood: ["Fresh", "Citrusy"], flavor: ["Latin"] },

  // Creamy
  { name: "🇱🇧 Toum (Garlic Cloud)", recipe: "1 cup Garlic, 3 cups Neutral oil, 1/2 cup Lemon juice, 1 tsp Salt", optional: "Iced water", proteins: ["Poultry", "Red Meat"], veggies: ["Root Vegetables"], mood: ["Creamy", "Bold"], flavor: ["Middle East"] },
  { name: "🇬🇷 Classic Tzatziki", recipe: "1 cup Greek yogurt, 1/2 cup Cucumber, 2 tbsp Lemon juice, 2 cloves Garlic", optional: "Dill", proteins: ["Red Meat", "Poultry"], veggies: ["Nightshades"], mood: ["Creamy", "Fresh"], flavor: ["Mediterranean"] },
  { name: "🇫🇷 Sauce Hollandaise", recipe: "1/2 cup Butter, 3 Egg yolks, 1 tbsp Lemon juice, 1 pinch Cayenne", optional: "White pepper", proteins: ["Seafood", "Poultry"], veggies: ["Cruciferous"], mood: ["Creamy", "Citrusy"], flavor: ["Mediterranean"] },
  { name: "🕌 Lemon-Tahini", recipe: "1/2 cup Tahini, 1/4 cup Warm water, 3 tbsp Lemon juice, 2 cloves Garlic", optional: "Cumin", proteins: ["Legumes", "Poultry"], veggies: ["Nightshades"], mood: ["Creamy", "Nutty"], flavor: ["Middle East"] },
  { name: "🇺🇸 Savory Mushroom Cream", recipe: "1 cup Mushroom broth, 1/2 cup Heavy cream, 1 tbsp Butter, 2 tbsp Soy sauce", optional: "Thyme", proteins: ["Red Meat", "Tofu"], veggies: ["Root Vegetables"], mood: ["Creamy", "Umami"], flavor: ["USA"] },

  // Nutty
  { name: "🇹🇭 Peanut Satay", recipe: "1/2 cup Peanut butter, 1/4 cup Coconut milk, 2 tbsp Soy sauce, 1 tbsp Lime juice", optional: "Curry paste", proteins: ["Poultry", "Tofu"], veggies: ["Cruciferous"], mood: ["Nutty", "Creamy"], flavor: ["Asian"] },
  { name: "🇬🇪 Bazhe (Walnut)", recipe: "1 cup Walnuts, 1/2 cup Water, 2 cloves Garlic, 1 tsp Coriander", optional: "Vinegar", proteins: ["Poultry", "Tofu"], veggies: ["Nightshades"], mood: ["Nutty", "Creamy"], flavor: ["Eastern Europe"] },
  { name: "🇲🇦 Muhammara", recipe: "1 cup Roasted peppers, 1/2 cup Walnuts, 2 tbsp Pomegranate molasses, 1 tsp Cumin", optional: "Chili flakes", proteins: ["Poultry", "Legumes"], veggies: ["Root Vegetables"], mood: ["Nutty", "Spicy"], flavor: ["Middle East"] },
  { name: "🇮🇹 Pistachio Pesto", recipe: "1/2 cup Pistachios, 1/2 cup Olive oil, 1/2 cup Parmesan, 1 cup Basil", optional: "Lemon zest", proteins: ["Seafood", "Poultry"], veggies: ["Nightshades"], mood: ["Nutty", "Fresh"], flavor: ["Mediterranean"] },
  { name: "🇨🇳 Sesame Sauce", recipe: "1/4 cup Sesame paste, 2 tbsp Soy sauce, 1 tbsp Sugar, 1 tsp Sesame oil", optional: "Chili oil", proteins: ["Tofu", "Poultry"], veggies: ["Leafy Greens"], mood: ["Nutty", "Umami"], flavor: ["Asian"] }
];

const filterEls = {
  mood: document.getElementById('moodFilter'),
  flavor: document.getElementById('flavorFilter'),
  protein: document.getElementById('proteinFilter'),
  veggie: document.getElementById('veggieFilter')
};

function init() {
  const container = document.getElementById('cardContainer');
  const sets = { mood: new Set(), flavor: new Set(), protein: new Set(), veggie: new Set() };

  sauces.forEach(s => {
    s.mood.forEach(m => sets.mood.add(m));
    s.flavor.forEach(f => sets.flavor.add(f));
    s.proteins.forEach(p => sets.protein.add(p));
    s.veggies.forEach(v => sets.veggie.add(v));

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.info = JSON.stringify({mood: s.mood, flavor: s.flavor, protein: s.proteins, veggie: s.veggies});
    card.innerHTML = `
      <h3>${s.name}</h3>
      <div class="recipe-box">
        <label>The Recipe</label>
        <p>${s.recipe}</p>
      </div>
      <div class="recipe-box">
        <label>Enhance With</label>
        <p>${s.optional}</p>
      </div>
      <div class="pairing-info">
        <div><strong>Pairs With</strong></div>
        <div>${s.proteins.join(' • ')}</div>
        <div>${s.veggies.join(' • ')}</div>
      </div>
      <div class="badge-row">
        ${s.mood.map(m => `<span class="badge tag-${m}">${m}</span>`).join('')}
        ${s.flavor.map(f => `<span class="badge tag-Flavor">${f}</span>`).join('')}
      </div>
    `;
    container.appendChild(card);
  });

  Object.keys(sets).forEach(key => populate(filterEls[key], sets[key], key));
  Object.values(filterEls).forEach(el => el.addEventListener('change', update));
}

function populate(select, data, type) {
  const label = type === 'veggie' ? 'Vegetables' : type.charAt(0).toUpperCase() + type.slice(1) + 's';
  select.innerHTML = `<option value="All">All ${label}</option>`;
  Array.from(data).sort().forEach(val => {
    const opt = document.createElement('option');
    opt.value = val;
    opt.textContent = val;
    select.appendChild(opt);
  });
}

function update() {
  const current = {
    mood: filterEls.mood.value,
    flavor: filterEls.flavor.value,
    protein: filterEls.protein.value,
    veggie: filterEls.veggie.value
  };

  document.querySelectorAll('.card').forEach(card => {
    const data = JSON.parse(card.dataset.info);
    const match = (current.mood === 'All' || data.mood.includes(current.mood)) &&
                  (current.flavor === 'All' || data.flavor.includes(current.flavor)) &&
                  (current.protein === 'All' || data.protein.includes(current.protein)) &&
                  (current.veggie === 'All' || data.veggie.includes(current.veggie));
    card.classList.toggle('hidden', !match);
  });

  // Smart Filter Logic
  Object.keys(filterEls).forEach(key => {
    const select = filterEls[key];
    const otherFilters = Object.keys(filterEls).filter(k => k !== key);
    const validValues = new Set();

    sauces.forEach(s => {
      const matchOthers = otherFilters.every(k => {
        const checkKey = k === 'veggie' ? 'veggies' : (k === 'protein' ? 'proteins' : k);
        return current[k] === 'All' || s[checkKey].includes(current[k]);
      });
      if (matchOthers) {
        const dataKey = key === 'veggie' ? 'veggies' : (key === 'protein' ? 'proteins' : key);
        s[dataKey].forEach(v => validValues.add(v));
      }
    });

    Array.from(select.options).forEach(opt => {
      if (opt.value === 'All') return;
      const ok = validValues.has(opt.value);
      opt.style.display = ok ? 'block' : 'none';
      opt.disabled = !ok;
    });
  });
}

init();
</script>
</body>
</html>
