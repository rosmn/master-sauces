<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Sauce & Marinade Picker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>🥫</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #000000;
    --surface: #1a1a1a;
    --on-surface: #e6e1e5;
    --primary: #d0bcff;
    --outline: #49454f;
    --secondary: #ccc2dc;
  }

  body {
    margin: 0;
    padding: 20px;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--on-surface);
    line-height: 1.4;
  }

  h1 {
    text-align: center;
    margin-bottom: 24px;
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
  }

  .filters {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin-bottom: 32px;
    max-width: 1200px;
    margin-left: auto;
    margin-right: auto;
  }

  .select-wrapper {
    position: relative;
    min-width: 160px;
    flex: 1;
    max-width: 240px;
  }

  select {
    width: 100%;
    padding: 12px;
    font-size: 13px;
    font-weight: 500;
    border-radius: 10px;
    border: 1px solid var(--outline);
    background: var(--surface);
    color: #fff;
    cursor: pointer;
    appearance: none;
  }

  select:focus {
    border-color: var(--primary);
    outline: none;
  }

  /* Compact Grid & Cards */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    max-width: 1600px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid transparent;
    display: flex;
    flex-direction: column;
    transition: all 0.2s ease;
  }

  .card:hover {
    background: #222;
    border-color: var(--outline);
    transform: translateY(-2px);
  }

  .card h3 {
    margin: 0 0 12px;
    font-size: 1.1rem;
    font-weight: 600;
    color: #fff;
  }

  .card p {
    margin: 6px 0;
    font-size: 13px;
    color: #bbb;
  }

  .card p strong {
    color: var(--primary);
    font-weight: 600;
    margin-right: 4px;
  }

  .badge-container {
    margin-top: auto;
    padding-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .badge {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .bg-Spicy { background: #601414; color: #ffb4ab; }
  .bg-Fresh { background: #00531a; color: #b1f2a7; }
  .bg-Citrusy { background: #554600; color: #eec400; }
  .bg-Umami { background: #004a77; color: #c2e8ff; }
  .bg-Creamy { background: #4a0080; color: #f0dbff; }
  .bg-Smoky { background: #333333; color: #e1e1e1; }
  .bg-Nutty { background: #4e342e; color: #d7ccc8; }
  .bg-Bold { background: #7d5260; color: #ffd8e4; }

  .bg-Asian, .bg-MiddleEast, .bg-Latin, .bg-Mediterranean, .bg-African, .bg-USA, .bg-EasternEurope {
    border: 1px solid var(--outline);
    background: transparent;
    color: var(--secondary);
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<h1>Sauce & Marinade Picker</h1>

<div class="filters">
  <div class="select-wrapper"><select id="moodFilter"><option value="All">All Moods</option></select></div>
  <div class="select-wrapper"><select id="flavorFilter"><option value="All">All Flavours</option></select></div>
  <div class="select-wrapper"><select id="proteinFilter"><option value="All">All Proteins</option></select></div>
  <div class="select-wrapper"><select id="veggieFilter"><option value="All">All Vegetables</option></select></div>
</div>

<div id="cardContainer" class="cards"></div>

<script>
const sauces = [
  // --- SPICY ---
  { name: "🇰🇷 Classic Gochujang", recipe: "3 tbsp Gochujang, 2 tbsp Soy sauce, 1 tbsp Honey, 1 tbsp Rice vinegar", optional: "Sesame oil", proteins: ["Poultry", "Tofu"], veggies: ["Cruciferous", "Root Vegetables"], mood: ["Spicy", "Umami"], flavor: ["Asian"] },
  { name: "🇲🇽 Salsa Macha", recipe: "1 cup Oil, 1/2 cup Dried chilies, 1/4 cup Peanuts, 3 cloves Garlic", optional: "Sesame seeds", proteins: ["Red Meat", "Seafood"], veggies: ["Root Vegetables"], mood: ["Spicy", "Nutty", "Smoky"], flavor: ["Latin"] },
  { name: "🇲🇦 Red Harissa", recipe: "1 cup Roasted red peppers, 3 tbsp Olive oil, 2 tsp Cumin, 1 tsp Coriander, 2 cloves Garlic", optional: "Lemon juice", proteins: ["Red Meat", "Legumes"], veggies: ["Nightshades"], mood: ["Spicy", "Smoky"], flavor: ["African"] },
  { name: "🇮🇩 Sambal Oelek Style", recipe: "1 cup Red chilies, 2 tbsp Vinegar, 1 tsp Salt, 1 tsp Sugar", optional: "Garlic, Ginger", proteins: ["Seafood", "Poultry"], veggies: ["Leafy Greens"], mood: ["Spicy", "Fresh"], flavor: ["Asian"] },
  { name: "🇺🇸 Buffalo Wing Sauce", recipe: "1/2 cup Hot sauce, 1/3 cup Melted butter, 1 tbsp White vinegar, 1/2 tsp Garlic powder", optional: "Worcestershire", proteins: ["Poultry", "Seafood"], veggies: ["Cruciferous"], mood: ["Spicy", "Bold"], flavor: ["USA"] },

  // --- FRESH ---
  { name: "🇮🇹 Classic Basil Pesto", recipe: "2 cups Basil, 1/2 cup Olive oil, 1/2 cup Parmesan, 1/3 cup Pine nuts", optional: "Garlic, Lemon", proteins: ["Poultry", "Seafood"], veggies: ["Nightshades"], mood: ["Fresh", "Nutty"], flavor: ["Mediterranean"] },
  { name: "🇦🇷 Chimichurri Verde", recipe: "1 cup Parsley, 1/2 cup Olive oil, 1/4 cup Red wine vinegar, 3 cloves Garlic", optional: "Oregano, Chili flakes", proteins: ["Red Meat"], veggies: ["Root Vegetables"], mood: ["Fresh", "Bold"], flavor: ["Latin"] },
  { name: "🇮🇳 Mint-Cilantro Chutney", recipe: "1 cup Mint, 1 cup Cilantro, 2 tbsp Lime juice, 1 tbsp Ginger, 1 Green chili", optional: "Yogurt", proteins: ["Poultry", "Legumes"], veggies: ["Cruciferous"], mood: ["Fresh", "Citrusy"], flavor: ["Asian"] },
  { name: "🇮🇹 Italian Salsa Verde", recipe: "1 cup Parsley, 1/2 cup Olive oil, 2 tbsp Capers, 2 cloves Garlic", optional: "Anchovies, Lemon zest", proteins: ["Seafood", "Red Meat"], veggies: ["Cruciferous"], mood: ["Fresh", "Citrusy"], flavor: ["Mediterranean"] },
  { name: "🇲🇽 Fresh Pico Sauce", recipe: "2 cups Tomatoes, 1/2 cup Onion, 1/2 cup Cilantro, 2 tbsp Lime juice", optional: "Jalapeno", proteins: ["Seafood", "Legumes"], veggies: ["Nightshades"], mood: ["Fresh", "Citrusy"], flavor: ["Latin"] },

  // --- CITRUSY ---
  { name: "🇻🇳 Nuoc Cham", recipe: "1/4 cup Lime juice, 1/4 cup Fish sauce, 1/4 cup Water, 2 tbsp Sugar", optional: "Garlic, Chili", proteins: ["Pork", "Seafood"], veggies: ["Leafy Greens"], mood: ["Citrusy", "Umami"], flavor: ["Asian"] },
  { name: "🇲🇦 Preserved Lemon Oil", recipe: "1/2 cup Olive oil, 2 tbsp Minced preserved lemon, 1 tsp Cumin, 1 tsp Turmeric", optional: "Cilantro", proteins: ["Poultry", "Seafood"], veggies: ["Root Vegetables"], mood: ["Citrusy", "Bold"], flavor: ["African"] },
  { name: "🇯🇵 Citrus Ponzu", recipe: "1/2 cup Soy sauce, 1/4 cup Lemon juice, 1/4 cup Mirin, 1 tsp Rice vinegar", optional: "Ginger", proteins: ["Seafood", "Tofu"], veggies: ["Cruciferous"], mood: ["Citrusy", "Umami"], flavor: ["Asian"] },
  { name: "🇬🇷 Lemon-Oregano Marinade", recipe: "1/3 cup Olive oil, 1/4 cup Lemon juice, 2 tsp Dried oregano, 2 cloves Garlic", optional: "Black pepper", proteins: ["Poultry", "Red Meat"], veggies: ["Nightshades"], mood: ["Citrusy", "Fresh"], flavor: ["Mediterranean"] },
  { name: "🇹🇭 Nam Jim Jaew", recipe: "3 tbsp Lime juice, 2 tbsp Fish sauce, 1 tbsp Toasted rice powder, 1 tsp Chili flakes", optional: "Shallots", proteins: ["Red Meat", "Pork"], veggies: ["Root Vegetables"], mood: ["Citrusy", "Spicy"], flavor: ["Asian"] },

  // --- UMAMI ---
  { name: "🇯🇵 Miso-Ginger Glaze", recipe: "3 tbsp White miso, 2 tbsp Mirin, 1 tbsp Soy sauce, 1 tbsp Ginger", optional: "Brown sugar", proteins: ["Seafood", "Tofu"], veggies: ["Cruciferous"], mood: ["Umami", "Fresh"], flavor: ["Asian"] },
  { name: "🇯🇵 Classic Teriyaki", recipe: "1/2 cup Soy sauce, 1/4 cup Water, 3 tbsp Brown sugar, 1 tbsp Mirin", optional: "Ginger, Garlic", proteins: ["Poultry", "Seafood"], veggies: ["Root Vegetables"], mood: ["Umami", "Bold"], flavor: ["Asian"] },
  { name: "🇨🇳 Black Pepper Sauce", recipe: "1/4 cup Soy sauce, 2 tbsp Oyster sauce, 1 tbsp Coarse black pepper, 1 tsp Cornstarch", optional: "Butter", proteins: ["Red Meat", "Tofu"], veggies: ["Alliums"], mood: ["Umami", "Spicy"], flavor: ["Asian"] },
  { name: "🇮🇹 Bagna Cauda", recipe: "1/2 cup Olive oil, 1/4 cup Butter, 6 Anchovy fillets, 4 cloves Garlic", optional: "Cream", proteins: ["Seafood"], veggies: ["Cruciferous"], mood: ["Umami", "Bold"], flavor: ["Mediterranean"] },
  { name: "🇬🇧 Savory Mushroom Gravy", recipe: "1 cup Mushroom broth, 2 tbsp Soy sauce, 1 tbsp Flour, 1 tbsp Butter", optional: "Thyme", proteins: ["Red Meat", "Tofu"], veggies: ["Root Vegetables"], mood: ["Umami", "Creamy"], flavor: ["USA"] },

  // --- CREAMY ---
  { name: "🇱🇧 Toum (Garlic Sauce)", recipe: "1 cup Garlic, 3 cups Oil, 1/2 cup Lemon juice, 1 tsp Salt", optional: "Ice water", proteins: ["Poultry", "Red Meat"], veggies: ["Root Vegetables"], mood: ["Creamy", "Bold"], flavor: ["Middle East"] },
  { name: "🇬🇷 Classic Tzatziki", recipe: "1 cup Greek yogurt, 1/2 cup Drained cucumber, 2 tbsp Lemon juice, 2 cloves Garlic", optional: "Dill", proteins: ["Red Meat", "Poultry"], veggies: ["Nightshades"], mood: ["Creamy", "Fresh"], flavor: ["Mediterranean"] },
  { name: "🇫🇷 Sauce Hollandaise", recipe: "1/2 cup Melted butter, 3 Egg yolks, 1 tbsp Lemon juice, 1 pinch Cayenne", optional: "White pepper", proteins: ["Seafood", "Poultry"], veggies: ["Cruciferous"], mood: ["Creamy", "Citrusy"], flavor: ["Mediterranean"] },
  { name: "🕌 Lemon-Tahini", recipe: "1/2 cup Tahini, 1/4 cup Warm water, 3 tbsp Lemon juice, 2 cloves Garlic", optional: "Cumin", proteins: ["Legumes", "Poultry"], veggies: ["Nightshades"], mood: ["Creamy", "Nutty"], flavor: ["Middle East"] },
  { name: "🇺🇸 Bang Bang Sauce", recipe: "1/2 cup Mayonnaise, 3 tbsp Thai sweet chili sauce, 1 tsp Sriracha", optional: "Honey", proteins: ["Seafood", "Poultry"], veggies: ["Cruciferous"], mood: ["Creamy", "Spicy"], flavor: ["USA"] },

  // --- SMOKY ---
  { name: "🇲🇽 Chipotle Adobo", recipe: "3 Chipotles in adobo, 1/4 cup Oil, 2 tbsp Lime juice, 1 tsp Cumin", optional: "Honey", proteins: ["Red Meat", "Poultry"], veggies: ["Nightshades"], mood: ["Smoky", "Spicy"], flavor: ["Latin"] },
  { name: "🇺🇸 Bourbon BBQ", recipe: "1 cup Ketchup, 1/4 cup Apple cider vinegar, 2 tbsp Bourbon, 2 tbsp Brown sugar", optional: "Liquid smoke", proteins: ["Red Meat", "Pork"], veggies: ["Root Vegetables"], mood: ["Smoky", "Bold"], flavor: ["USA"] },
  { name: "🇪🇸 Romesco", recipe: "2 Roasted red peppers, 1/2 cup Almonds, 1/4 cup Olive oil, 1 tbsp Sherry vinegar", optional: "Smoked paprika", proteins: ["Seafood", "Poultry"], veggies: ["Cruciferous"], mood: ["Smoky", "Nutty"], flavor: ["Mediterranean"] },
  { name: "🇱🇧 Smoky Baba Sauce", recipe: "1 Roasted Eggplant, 1/4 cup Tahini, 2 tbsp Lemon juice, 1 clove Garlic", optional: "Olive oil", proteins: ["Legumes", "Poultry"], veggies: ["Nightshades"], mood: ["Smoky", "Creamy"], flavor: ["Middle East"] },
  { name: "🇭🇺 Paprika Oil", recipe: "1/2 cup Oil, 2 tbsp Smoked paprika, 4 cloves Garlic, 1 tsp Salt", optional: "Chili flakes", proteins: ["Red Meat", "Poultry"], veggies: ["Root Vegetables"], mood: ["Smoky", "Bold"], flavor: ["Eastern Europe"] },

  // --- NUTTY ---
  { name: "🇹🇭 Peanut Satay", recipe: "1/2 cup Peanut butter, 1/4 cup Coconut milk, 2 tbsp Soy sauce, 1 tbsp Lime juice", optional: "Red curry paste", proteins: ["Poultry", "Tofu"], veggies: ["Cruciferous"], mood: ["Nutty", "Creamy"], flavor: ["Asian"] },
  { name: "🇬🇪 Bazhe (Walnut)", recipe: "1 cup Walnuts, 1/2 cup Water, 2 cloves Garlic, 1 tsp Coriander", optional: "Vinegar", proteins: ["Poultry", "Tofu"], veggies: ["Nightshades"], mood: ["Nutty", "Creamy"], flavor: ["Eastern Europe"] },
  { name: "🇲🇦 Muhammara", recipe: "1 cup Roasted peppers, 1/2 cup Walnuts, 2 tbsp Pomegranate molasses, 1 tsp Cumin", optional: "Breadcrumbs", proteins: ["Poultry", "Legumes"], veggies: ["Root Vegetables"], mood: ["Nutty", "Spicy"], flavor: ["Middle East"] },
  { name: "🇮🇹 Pistachio Pesto", recipe: "1/2 cup Pistachios, 1/2 cup Olive oil, 1/2 cup Parmesan, 1 cup Basil", optional: "Lemon zest", proteins: ["Seafood", "Poultry"], veggies: ["Nightshades"], mood: ["Nutty", "Fresh"], flavor: ["Mediterranean"] },
  { name: "🇨🇳 Sesame Sauce", recipe: "1/4 cup Toasted sesame paste, 2 tbsp Soy sauce, 1 tbsp Sugar, 1 tsp Sesame oil", optional: "Chili oil", proteins: ["Tofu", "Poultry"], veggies: ["Leafy Greens"], mood: ["Nutty", "Umami"], flavor: ["Asian"] }
];

const filterEls = {
  mood: document.getElementById('moodFilter'),
  flavor: document.getElementById('flavorFilter'),
  protein: document.getElementById('proteinFilter'),
  veggie: document.getElementById('veggieFilter')
};

function init() {
  const container = document.getElementById('cardContainer');
  const sets = { mood: new Set(), flavor: new Set(), protein: new Set(), veggie: new Set() };

  sauces.forEach(s => {
    s.mood.forEach(m => sets.mood.add(m));
    s.flavor.forEach(f => sets.flavor.add(f));
    s.proteins.forEach(p => sets.protein.add(p));
    s.veggies.forEach(v => sets.veggie.add(v));

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.info = JSON.stringify({mood: s.mood, flavor: s.flavor, protein: s.proteins, veggie: s.veggies});
    card.innerHTML = `
      <h3>${s.name}</h3>
      <p><strong>Recipe:</strong> ${s.recipe}</p>
      <p><strong>Optional:</strong> ${s.optional}</p>
      <p><strong>Pairs:</strong> ${s.proteins.join(', ')} & ${s.veggies.join(', ')}</p>
      <div class="badge-container">
        ${s.mood.map(m => `<span class="badge bg-${m}">${m}</span>`).join('')}
        ${s.flavor.map(f => `<span class="badge bg-${f.replace(/\s/g, '')}">${f}</span>`).join('')}
      </div>
    `;
    container.appendChild(card);
  });

  Object.keys(sets).forEach(key => populate(filterEls[key], sets[key]));
  Object.values(filterEls).forEach(el => el.addEventListener('change', update));
}

function populate(select, data) {
  Array.from(data).sort().forEach(val => {
    const opt = document.createElement('option');
    opt.value = val;
    opt.textContent = val;
    select.appendChild(opt);
  });
}

function update() {
  const current = {
    mood: filterEls.mood.value,
    flavor: filterEls.flavor.value,
    protein: filterEls.protein.value,
    veggie: filterEls.veggie.value
  };

  document.querySelectorAll('.card').forEach(card => {
    const data = JSON.parse(card.dataset.info);
    const match = (current.mood === 'All' || data.mood.includes(current.mood)) &&
                  (current.flavor === 'All' || data.flavor.includes(current.flavor)) &&
                  (current.protein === 'All' || data.protein.includes(current.protein)) &&
                  (current.veggie === 'All' || data.veggie.includes(current.veggie));
    card.classList.toggle('hidden', !match);
  });

  Object.keys(filterEls).forEach(key => {
    const select = filterEls[key];
    const otherFilters = Object.keys(filterEls).filter(k => k !== key);
    const validValues = new Set();

    sauces.forEach(s => {
      const matchOthers = otherFilters.every(k => {
        const checkKey = k === 'veggie' ? 'veggies' : (k === 'protein' ? 'proteins' : k);
        return current[k] === 'All' || s[checkKey].includes(current[k]);
      });
      if (matchOthers) {
        const dataKey = key === 'veggie' ? 'veggies' : (key === 'protein' ? 'proteins' : key);
        s[dataKey].forEach(v => validValues.add(v));
      }
    });

    Array.from(select.options).forEach(opt => {
      if (opt.value === 'All') return;
      const ok = validValues.has(opt.value);
      opt.style.display = ok ? 'block' : 'none';
      opt.disabled = !ok;
    });
  });
}

init();
</script>
</body>
</html>
